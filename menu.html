<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu | Café Aroma</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>


<header class="page-header">
  <h1><i class="fas fa-coffee"></i> Our Menu</h1>
  <!-- <img src="assets/images/logo.png" class="logo"> -->
  <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="order.html">Order</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" id="loginLink">Login</a>
    <a href="register.html" id="registerLink">Register</a>
    <span id="userDisplay" class="user-display is-hidden"></span>
    <a href="#" id="logoutLink" class="is-hidden">Logout</a>
    <button class="cart-toggle" id="cartToggle" type="button" aria-label="Open cart" aria-controls="cartPanel">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 4h-2l-1 2h2l3.6 7.59-1.35 2.45a1 1 0 0 0 .9 1.5h12v-2h-10.42l.55-1h7.87a1 1 0 0 0 .92-.63l3.1-7.37a1 1 0 0 0-.92-1.37h-14.3l-.6-1.17a1 1 0 0 0-.9-.53zm3 16a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"/>
      </svg>
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </nav>

</header>

<section id="menu-container" class="menu-single-card">
  <div class="menu-card-master">
    <!-- Tabs Navigation -->
    <div class="menu-tabs-nav">
      <button class="menu-tab-btn active" data-category="all">All Items</button>
      <button class="menu-tab-btn" data-category="pizza"><i class="fas fa-pizza-slice"></i> Pizza</button>
      <button class="menu-tab-btn" data-category="coffee"><i class="fas fa-coffee"></i> Coffee</button>
      <button class="menu-tab-btn" data-category="burger"><i class="fas fa-burger"></i> Burger</button>
      <button class="menu-tab-btn" data-category="combo"><i class="fas fa-gift"></i> Combos</button>
      <button class="menu-tab-btn" data-category="beverage"><i class="fas fa-glass-water"></i> Beverages</button>
    </div>

    <!-- Sorting & Filter Toolbar -->
    <div class="menu-toolbar">
      <div class="toolbar-left">
        <input type="search" id="menuSearch" placeholder="Search items..." class="menu-search-input" aria-label="Search menu items">
      </div>
      <div class="toolbar-right">
        <select id="sortMenu" class="sort-dropdown" aria-label="Sort menu items">
          <option value="name">Sort by Name (A-Z)</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="rating"><i class="fas fa-star"></i> Best Rated</option>
          <option value="popular"><i class="fas fa-fire"></i> Most Popular</option>
        </select>
        <button id="viewToggle" class="view-toggle-btn" title="Toggle view">
          <svg viewBox="0 0 24 24" class="grid-icon" aria-hidden="true">
            <path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Dietary Filter Tags -->
    <div class="dietary-filters">
      <button class="diet-tag" data-diet="all" title="Show all items">All</button>
      <button class="diet-tag" data-diet="vegetarian" title="Vegetarian items"><i class="fas fa-leaf"></i> Vegetarian</button>
      <button class="diet-tag" data-diet="vegan" title="Vegan items"><i class="fas fa-seedling"></i> Vegan</button>
      <button class="diet-tag" data-diet="gluten-free" title="Gluten-free items"><i class="fas fa-wheat"></i> Gluten-Free</button>
      <button class="diet-tag" data-diet="spicy" title="Spicy items"><i class="fas fa-pepper-hot"></i> Spicy</button>
    </div>

    <!-- Menu Items Display -->
    <div class="menu-items-wrapper">
      <div id="menu-items-container" class="menu-items-grid">
        <!-- Items loaded here -->
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="footer-content">
    <div class="footer-section">
      <h3>Café Aroma</h3>
      <p>Your daily dose of happiness <i class="fas fa-coffee"></i></p>
    </div>
    <div class="footer-section">
      <h4>Quick Links</h4>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="order.html">Order</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="footer-section">
      <h4>Contact</h4>
      <p>Email: info@cafearoma.com</p>
      <p>Phone: 01752498396</p>
      <p>123 Gulshan Avenue, Dhaka</p>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 Café Aroma. All rights reserved.</p>
  </div>
</footer>

<script type="module" src="js/nav-active.js"></script>
<script type="module" src="js/menu.js"></script>
<script type="module" src="js/cart.js"></script>
<script type="module" src="js/logout.js"></script>

</body>
</html>
