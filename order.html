<!DOCTYPE html>
<html>
<head>
  <title>Order | Café Aroma</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="order-header">
  <button type="button" class="back-btn" id="backButton">&larr; Back</button>
  <h2>Place Your Order</h2>
</div>

<section class="cart-preview">
  <h3>Your Cart</h3>
  <p id="cart-message"></p>
  <ul id="cart-items" class="cart-items"></ul>
  <div class="cart-summary">
    <span>Total</span>
    <strong id="cart-total">$0.00</strong>
  </div>
</section>

<div id="auth-message" class="auth-message"></div>

<form id="orderForm">
  <input type="text" id="name" placeholder="Your Name" required>
  <button type="submit">Place Order</button>
</form>

<footer>
  <div class="footer-content">
    <div class="footer-section">
      <h3>Café Aroma</h3>
      <p>Your daily dose of happiness ☕</p>
    </div>
    <div class="footer-section">
      <h4>Quick Links</h4>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="order.html">Order</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="footer-section">
      <h4>Contact</h4>
      <p>Email: info@cafearoma.com</p>
      <p>Phone: 01752498396</p>
      <p>123 Gulshan Avenue, Dhaka</p>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 Café Aroma. All rights reserved.</p>
  </div>
</footer>

<script type="module" src="js/order.js"></script>
</body>
</html>
