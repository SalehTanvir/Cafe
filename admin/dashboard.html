<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Café Aroma</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="admin-container">
  <header class="admin-header">
    <h1>Admin Dashboard</h1>
    <div class="admin-header-actions">
      <span id="adminUserDisplay" class="admin-user-name"></span>
      <a href="#" id="adminLogout" class="admin-logout-btn">Logout</a>
    </div>
  </header>

  <nav class="admin-nav">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="add-menu.html">Add Menu Item</a>
  </nav>

  <main class="admin-main">
    <div class="admin-stats">
      <div class="stat-card">
        <h3>Total Users</h3>
        <p class="stat-number" id="userCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Total Orders</h3>
        <p class="stat-number" id="orderCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Menu Items</h3>
        <p class="stat-number" id="menuCount">0</p>
      </div>
    </div>

    <div class="admin-card">
      <h2>Welcome to Admin Panel</h2>
      <p>Use the navigation to manage cafe menu items.</p>
      <a href="add-menu.html" class="btn">Add New Item</a>
    </div>

    <div class="admin-card">
      <h2>Registered Users</h2>
      <div id="usersList" class="users-list"></div>
    </div>

    <div class="admin-card">
      <h2>Order History</h2>
      <div id="ordersList" class="orders-list"></div>
    </div>

    <div class="admin-card admin-edit-card" id="adminEditCard">
      <h2>Edit Menu Item</h2>
      <form id="editMenuForm" class="admin-form">
        <input type="hidden" id="editItemId">

        <label for="editItemName">Item Name</label>
        <input type="text" id="editItemName" required>

        <label for="editItemPrice">Price (৳)</label>
        <input type="number" id="editItemPrice" step="0.01" min="0" required>

        <label for="editItemImage">Image URL</label>
        <input type="url" id="editItemImage" required>

        <label for="editItemType">Item Type</label>
        <select id="editItemType" required>
          <option value="Coffee">Coffee</option>
          <option value="Pizza">Pizza</option>
          <option value="Burger">Burger</option>
        </select>

        <label for="editItemDescription">Description</label>
        <textarea id="editItemDescription" rows="4" required></textarea>

        <div class="admin-form-actions">
          <button type="submit" class="btn">Save Changes</button>
          <button type="button" class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
        </div>
      </form>
      <div id="editMenuStatus" class="auth-status"></div>
    </div>

    <div class="admin-card">
      <h2>Menu Items</h2>
      <div id="adminMenuList" class="admin-menu-list"></div>
    </div>
  </main>
</div>

<script type="module" src="../js/admin.js"></script>
</body>
</html>
